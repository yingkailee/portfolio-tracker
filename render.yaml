services:
  - type: web
    name: portfolio-tracker-backend
    env: docker
    region: oregon
    dockerfile: ./Dockerfile
    repo: https://github.com/your-username/finances
    branch: main
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: H2_CONSOLE_ENABLED
        value: "false"
    healthCheckPath: /api/funds