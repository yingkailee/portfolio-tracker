version: '3.8'

services:
  backend:
    build:
      context: ./backend/portfolio-tracker-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:h2:mem:portfolio
      - DB_DRIVER=org.h2.Driver
      - CORS_ALLOWED_ORIGINS=*
      - JWT_SECRET=default-dev-secret-key-for-local-testing-only

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend